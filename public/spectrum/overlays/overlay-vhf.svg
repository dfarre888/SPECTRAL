<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- VHF Band Overlay: 30–300 MHz  |  x = 30 + (f_MHz - 30) / 270 * 620 -->

  <!-- Scale area background -->
  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Sub-band fills above scale (Blue Force spans) -->
  <rect x="30"  y="92" width="133" height="23" fill="#1E3A8A" opacity="0.30"/>
  <rect x="232" y="92" width="44"  height="23" fill="#064E3B" opacity="0.30"/>
  <rect x="319" y="92" width="42"  height="23" fill="#0E4F64" opacity="0.30"/>

  <!-- Sub-band fills below scale (Red Force spans) -->
  <rect x="30"  y="115" width="149" height="23" fill="#7F1D1D" opacity="0.28"/>

  <!-- ── BLUE FORCE BADGES (above scale) ── -->
  <!-- SINCGARS 30–88 MHz (center x=96) -->
  <rect x="29"  y="55" width="122" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="90"  y="66" font-size="7.5" fill="#BFDBFE" text-anchor="middle">SINCGARS  30–88 MHz</text>
  <line x1="90" y1="72" x2="90" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ATC/ILS aviation 118–137 MHz (center x=254) -->
  <rect x="205" y="35" width="110" height="17" rx="2" fill="#064E3B" opacity="0.88"/>
  <text x="260" y="46" font-size="7.5" fill="#A7F3D0" text-anchor="middle">ATC / ILS  118–137</text>
  <line x1="254" y1="52" x2="254" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Maritime VHF Ch16 156.8 MHz (center x=340) -->
  <rect x="289" y="55" width="118" height="17" rx="2" fill="#0E4F64" opacity="0.88"/>
  <text x="348" y="66" font-size="7.5" fill="#BAE6FD" text-anchor="middle">Maritime Ch16  156.8</text>
  <line x1="340" y1="72" x2="340" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Tick marks: 60, 100, 150, 200, 250 MHz -->
  <line x1="99"  y1="109" x2="99"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="306" y1="109" x2="306" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <!-- Frequency labels -->
  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="99"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">60</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">100</text>
  <text x="306" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">150</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">200</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">250</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">300</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">MHz</text>

  <!-- ── RED FORCE BADGES (below scale) ── -->
  <!-- R-168 Russian tactical 30–108 MHz -->
  <rect x="29"  y="157" width="120" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="89"  y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">R-168 RU  30–108 MHz</text>
  <line x1="89" y1="157" x2="89" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- FPV RC legacy 72 MHz -->
  <rect x="102" y="177" width="76" height="15" rx="2" fill="#78350F" opacity="0.88"/>
  <text x="140" y="187" font-size="7" fill="#FED7AA" text-anchor="middle">FPV RC  72 MHz</text>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA segments -->
  <rect x="30"  y="183" width="133" height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="96"  y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <rect x="209" y="183" width="67"  height="11" fill="#7D1128" opacity="0.88"/>
  <text x="242" y="192" font-size="5.5" fill="#FCA5A5" text-anchor="middle">ARN</text>
  <rect x="292" y="183" width="9"   height="11" fill="#374151" opacity="0.88"/>
  <rect x="319" y="183" width="42"  height="11" fill="#164E63" opacity="0.88"/>
  <text x="340" y="192" font-size="5.5" fill="#BAE6FD" text-anchor="middle">MM</text>
  <rect x="478" y="183" width="172" height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="564" y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>

  <!-- NTIA segments -->
  <rect x="30"  y="195" width="133" height="11" fill="#92400E" opacity="0.80"/>
  <text x="96"  y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV</text>
  <rect x="163" y="195" width="46"  height="11" fill="#14532D" opacity="0.80"/>
  <text x="186" y="204" font-size="5.5" fill="#A7F3D0" text-anchor="middle">NGV</text>
  <rect x="209" y="195" width="67"  height="11" fill="#1E3A5F" opacity="0.80"/>
  <text x="242" y="204" font-size="5.5" fill="#BFDBFE" text-anchor="middle">SHR</text>
  <rect x="276" y="195" width="16"  height="11" fill="#4B1D96" opacity="0.80"/>
  <rect x="292" y="195" width="27"  height="11" fill="#1A3A2A" opacity="0.80"/>
  <rect x="319" y="195" width="42"  height="11" fill="#1E3A5F" opacity="0.80"/>
  <text x="340" y="204" font-size="5.5" fill="#BFDBFE" text-anchor="middle">SHR</text>
  <rect x="361" y="195" width="117" height="11" fill="#14532D" opacity="0.80"/>
  <text x="419" y="204" font-size="5.5" fill="#A7F3D0" text-anchor="middle">NGV</text>
  <rect x="478" y="195" width="172" height="11" fill="#92400E" opacity="0.80"/>
  <text x="564" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV</text>

  <!-- Band title -->
  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">VHF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">30 – 300 MHz</text>

  <!-- Divider line between ACMA/NTIA rows -->
  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>
</svg>
