<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!--
    RADAR BANDS Overlay: 0.23 GHz – 110 GHz  LOG FREQUENCY
    x = 30 + log10(f_GHz / 0.23) / log10(110 / 0.23) * 620
      = 30 + log10(f / 0.23) / 2.6797 * 620

    Band boundaries:
    P/UHF 0.23–1   → x=30  to x=178
    L     1–2      → x=178 to x=247
    S     2–4      → x=247 to x=317
    C     4–8      → x=317 to x=386
    X     8–12     → x=386 to x=427
    Ku    12–18    → x=427 to x=468
    K     18–26.5  → x=468 to x=507  (absorption gap)
    Ka    26.5–40  → x=507 to x=548
    V     40–75    → x=548 to x=611
    W     75–110   → x=611 to x=650
  -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Band fills on scale area -->
  <rect x="30"  y="92" width="148" height="23" fill="#134E4A" opacity="0.35"/>  <!-- P/UHF -->
  <rect x="178" y="92" width="69"  height="23" fill="#164E63" opacity="0.40"/>  <!-- L -->
  <rect x="247" y="92" width="70"  height="23" fill="#1E3A8A" opacity="0.35"/>  <!-- S -->
  <rect x="317" y="92" width="69"  height="23" fill="#1E40AF" opacity="0.35"/>  <!-- C -->
  <rect x="386" y="92" width="41"  height="23" fill="#5B21B6" opacity="0.40"/>  <!-- X -->
  <rect x="427" y="92" width="41"  height="23" fill="#6D28D9" opacity="0.40"/>  <!-- Ku -->
  <rect x="468" y="92" width="39"  height="23" fill="#374151" opacity="0.30"/>  <!-- K (gap) -->
  <rect x="507" y="92" width="41"  height="23" fill="#7C3AED" opacity="0.40"/>  <!-- Ka -->
  <rect x="548" y="92" width="63"  height="23" fill="#831843" opacity="0.35"/>  <!-- V -->
  <rect x="611" y="92" width="39"  height="23" fill="#9D174D" opacity="0.35"/>  <!-- W -->

  <!-- Band labels on scale (short) -->
  <text x="104" y="110" font-size="6"   fill="#34D399" text-anchor="middle">P/UHF</text>
  <text x="212" y="110" font-size="6"   fill="#38BDF8" text-anchor="middle">L</text>
  <text x="282" y="110" font-size="6"   fill="#60A5FA" text-anchor="middle">S</text>
  <text x="351" y="110" font-size="6"   fill="#93C5FD" text-anchor="middle">C</text>
  <text x="406" y="110" font-size="6"   fill="#C4B5FD" text-anchor="middle">X</text>
  <text x="447" y="110" font-size="6"   fill="#DDD6FE" text-anchor="middle">Ku</text>
  <text x="487" y="110" font-size="5.5" fill="#6B7280" text-anchor="middle">K</text>
  <text x="527" y="110" font-size="6"   fill="#E9D5FF" text-anchor="middle">Ka</text>
  <text x="579" y="110" font-size="6"   fill="#FBCFE8" text-anchor="middle">V</text>
  <text x="630" y="110" font-size="6"   fill="#FCA5A5" text-anchor="middle">W</text>

  <!-- ── BLUE FORCE BADGES (above scale) ── -->
  <!-- AN/APG-81 AESA X-band (F-35) -->
  <rect x="362" y="35" width="104" height="17" rx="2" fill="#5B21B6" opacity="0.88"/>
  <text x="414" y="46" font-size="7.5" fill="#DDD6FE" text-anchor="middle">AN/APG-81  X-band</text>
  <line x1="406" y1="52" x2="406" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Sentinel AN/MPQ-64 S-band C-UAS -->
  <rect x="230" y="56" width="108" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="284" y="67" font-size="7.5" fill="#BFDBFE" text-anchor="middle">Sentinel MPQ-64  S</text>
  <line x1="282" y1="73" x2="282" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- JLENS / Ka-band C-UAS (DroneShield) -->
  <rect x="490" y="44" width="106" height="17" rx="2" fill="#7C3AED" opacity="0.88"/>
  <text x="543" y="55" font-size="7.5" fill="#EDE9FE" text-anchor="middle">Ka C-UAS  26.5–40</text>
  <line x1="527" y1="61" x2="527" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks at band boundaries -->
  <line x1="178" y1="109" x2="178" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="247" y1="109" x2="247" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="317" y1="109" x2="317" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="386" y1="109" x2="386" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="427" y1="109" x2="427" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="468" y1="109" x2="468" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="507" y1="109" x2="507" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="548" y1="109" x2="548" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="611" y1="109" x2="611" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <!-- Frequency labels -->
  <text x="30"  y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">230M</text>
  <text x="178" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">1G</text>
  <text x="247" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">2G</text>
  <text x="317" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">4G</text>
  <text x="386" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">8G</text>
  <text x="427" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">12G</text>
  <text x="468" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">18G</text>
  <text x="507" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">26G</text>
  <text x="548" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">40G</text>
  <text x="611" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">75G</text>
  <text x="650" y="140" font-size="6.5" fill="#94A3B8" text-anchor="middle">110G</text>
  <text x="340" y="151" font-size="6.5" fill="#475569" text-anchor="middle">Hz  (log scale)</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- 91N6E Big Bird (S-400 acquisition radar) L-band -->
  <rect x="158" y="157" width="110" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="213" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Big Bird 91N6E  L/S</text>
  <line x1="213" y1="157" x2="213" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- 92N6E Grave Stone (S-400 engagement) X-band -->
  <rect x="360" y="157" width="110" height="17" rx="2" fill="#7F1D1D" opacity="0.75"/>
  <text x="415" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Grave Stone 92N6  X</text>
  <line x1="406" y1="157" x2="406" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── IEEE BAND APPLICATION BLOCKS ── -->
  <rect x="0" y="180" width="680" height="13" fill="#0C0C14" opacity="0.92"/>
  <rect x="0" y="193" width="680" height="13" fill="#080810" opacity="0.92"/>
  <text x="3" y="189" font-size="5.5" fill="#475569" font-weight="bold">RADAR</text>
  <text x="3" y="203" font-size="5.5" fill="#475569" font-weight="bold">USE</text>

  <!-- Band name row -->
  <rect x="30"  y="180" width="148" height="12" fill="#134E4A" opacity="0.80"/>
  <text x="104" y="188" font-size="5" fill="#34D399" text-anchor="middle">P/UHF EW, OTH, Ballistic</text>
  <rect x="178" y="180" width="69"  height="12" fill="#164E63" opacity="0.80"/>
  <text x="212" y="188" font-size="5" fill="#38BDF8" text-anchor="middle">L  ATC / Acq</text>
  <rect x="247" y="180" width="70"  height="12" fill="#1E3A8A" opacity="0.80"/>
  <text x="282" y="188" font-size="5" fill="#60A5FA" text-anchor="middle">S  Search / Wx</text>
  <rect x="317" y="180" width="69"  height="12" fill="#1E40AF" opacity="0.80"/>
  <text x="351" y="188" font-size="5" fill="#93C5FD" text-anchor="middle">C  Tac/Ship</text>
  <rect x="386" y="180" width="41"  height="12" fill="#4C1D95" opacity="0.80"/>
  <text x="406" y="188" font-size="5" fill="#DDD6FE" text-anchor="middle">X FC/SAR</text>
  <rect x="427" y="180" width="41"  height="12" fill="#6D28D9" opacity="0.80"/>
  <text x="447" y="188" font-size="5" fill="#EDE9FE" text-anchor="middle">Ku SAR</text>
  <rect x="468" y="180" width="39"  height="12" fill="#374151" opacity="0.65"/>
  <text x="487" y="188" font-size="4.5" fill="#6B7280" text-anchor="middle">K (att.)</text>
  <rect x="507" y="180" width="41"  height="12" fill="#7C3AED" opacity="0.80"/>
  <text x="527" y="188" font-size="4.5" fill="#F5F3FF" text-anchor="middle">Ka C-UAS</text>
  <rect x="548" y="180" width="63"  height="12" fill="#831843" opacity="0.80"/>
  <text x="579" y="188" font-size="4.5" fill="#FBCFE8" text-anchor="middle">V mmWave</text>
  <rect x="611" y="180" width="39"  height="12" fill="#9D174D" opacity="0.80"/>
  <text x="630" y="188" font-size="4.5" fill="#FCA5A5" text-anchor="middle">W auto/exp</text>

  <!-- Application row -->
  <rect x="30"  y="193" width="148" height="12" fill="#0A1F1C" opacity="0.80"/>
  <text x="104" y="201" font-size="4.5" fill="#6EE7B7" text-anchor="middle">Nebo-M, Struna, BMEWS</text>
  <rect x="178" y="193" width="69"  height="12" fill="#0C1F26" opacity="0.80"/>
  <text x="212" y="201" font-size="4.5" fill="#38BDF8" text-anchor="middle">76N6, S-300 acq</text>
  <rect x="247" y="193" width="70"  height="12" fill="#0C1527" opacity="0.80"/>
  <text x="282" y="201" font-size="4.5" fill="#60A5FA" text-anchor="middle">Sentinel, 9K317 Buk</text>
  <rect x="317" y="193" width="69"  height="12" fill="#0A1530" opacity="0.80"/>
  <text x="351" y="201" font-size="4.5" fill="#93C5FD" text-anchor="middle">Ship FC, SAR imagery</text>
  <rect x="386" y="193" width="41"  height="12" fill="#1C0A3F" opacity="0.80"/>
  <text x="406" y="201" font-size="4.5" fill="#DDD6FE" text-anchor="middle">APG-81/APG-79</text>
  <rect x="427" y="193" width="41"  height="12" fill="#230A52" opacity="0.80"/>
  <text x="447" y="201" font-size="4.5" fill="#EDE9FE" text-anchor="middle">JSTARS, SAR hi-res</text>
  <rect x="468" y="193" width="39"  height="12" fill="#1A1D24" opacity="0.70"/>
  <text x="487" y="201" font-size="4.5" fill="#4B5563" text-anchor="middle">rarely used</text>
  <rect x="507" y="193" width="41"  height="12" fill="#2A0A5E" opacity="0.80"/>
  <text x="527" y="201" font-size="4.5" fill="#F5F3FF" text-anchor="middle">DroneShield, Fortem</text>
  <rect x="548" y="193" width="63"  height="12" fill="#350A22" opacity="0.80"/>
  <text x="579" y="201" font-size="4.5" fill="#FBCFE8" text-anchor="middle">V-band comms (60G)</text>
  <rect x="611" y="193" width="39"  height="12" fill="#3E0A1E" opacity="0.80"/>
  <text x="630" y="201" font-size="4.5" fill="#FCA5A5" text-anchor="middle">Collision avoid</text>

  <line x1="30" y1="193" x2="650" y2="193" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="10" fill="#F97316" font-weight="bold">RADAR</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">0.23 – 110 GHz</text>
  <text x="10" y="42" font-size="6" fill="#475569">IEEE bands (log scale)</text>
</svg>
