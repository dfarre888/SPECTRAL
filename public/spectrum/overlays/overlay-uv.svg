<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!--
    UV Band Overlay: 400nm → 10nm (frequency increases left to right = wavelength decreases)
    LINEAR reverse wavelength scale
    x = 30 + (400 - λ_nm) / 390 * 620

    400nm → x=30    |  380nm → x=62    |  315nm → x=166
    280nm → x=219   |  200nm → x=368   |  100nm → x=527   |  10nm → x=650
  -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- UV sub-band fills -->
  <!-- UVA 315–400nm → x=30 to x=166 -->
  <rect x="30"  y="92" width="136" height="23" fill="#6D28D9" opacity="0.20"/>
  <!-- UVB 280–315nm → x=166 to x=219 -->
  <rect x="166" y="92" width="53"  height="23" fill="#7C3AED" opacity="0.20"/>
  <!-- UVC 200–280nm → x=219 to x=368 -->
  <rect x="219" y="92" width="149" height="23" fill="#8B5CF6" opacity="0.20"/>
  <!-- VUV 100–200nm → x=368 to x=527 -->
  <rect x="368" y="92" width="159" height="23" fill="#A78BFA" opacity="0.18"/>
  <!-- EUV 10–100nm → x=527 to x=650 -->
  <rect x="527" y="92" width="123" height="23" fill="#C4B5FD" opacity="0.15"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- UV missile warning system (MILDS AN/AAR-60) ~250–400nm -->
  <rect x="28"  y="44" width="124" height="17" rx="2" fill="#6D28D9" opacity="0.88"/>
  <text x="90"  y="55" font-size="7.5" fill="#DDD6FE" text-anchor="middle">UV MWS  250–400nm</text>
  <!-- 250nm → x=30+(400-250)/390*620=30+238.5=269 (centre of badge area) -->
  <line x1="98" y1="61" x2="98" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Solar blind UV SHORAD MANPADS seeker 240–280nm -->
  <rect x="205" y="56" width="128" height="17" rx="2" fill="#4C1D95" opacity="0.88"/>
  <text x="269" y="67" font-size="7.5" fill="#C4B5FD" text-anchor="middle">Solar-blind UV  240–280</text>
  <!-- 260nm → x=30+(400-260)/390*620=30+222.6=253 -->
  <line x1="253" y1="73" x2="253" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#A78BFA" stroke-width="6" opacity="0.10"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#A78BFA" stroke-width="1.5"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#A78BFA" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#A78BFA" stroke-width="1.5"/>

  <!-- Ticks at sub-band boundaries -->
  <line x1="166" y1="109" x2="166" y2="121" stroke="#A78BFA" stroke-width="1"/>
  <line x1="219" y1="109" x2="219" y2="121" stroke="#A78BFA" stroke-width="1"/>
  <line x1="368" y1="109" x2="368" y2="121" stroke="#A78BFA" stroke-width="1"/>
  <line x1="527" y1="109" x2="527" y2="121" stroke="#A78BFA" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">400nm</text>
  <text x="166" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">315nm</text>
  <text x="219" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">280nm</text>
  <text x="368" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">200nm</text>
  <text x="527" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">100nm</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">10nm</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">nm  (← wavelength decreases | frequency increases →)</text>

  <!-- Sub-band labels on scale -->
  <text x="98"  y="110" font-size="5.5" fill="#A78BFA" text-anchor="middle">UVA</text>
  <text x="192" y="110" font-size="5.5" fill="#8B5CF6" text-anchor="middle">UVB</text>
  <text x="293" y="110" font-size="5.5" fill="#7C3AED" text-anchor="middle">UVC</text>
  <text x="447" y="110" font-size="5.5" fill="#6D28D9" text-anchor="middle">VUV</text>
  <text x="588" y="110" font-size="5.5" fill="#5B21B6" text-anchor="middle">EUV</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- No specific red-force UV platforms — UV jamming / spoofing theoretical -->
  <!-- UV-C sterilisation / detection for bio-weapon context (educational) -->
  <rect x="215" y="157" width="130" height="17" rx="2" fill="#4C1D95" opacity="0.75"/>
  <text x="280" y="168" font-size="7.5" fill="#C4B5FD" text-anchor="middle">UV-C Bio-detect  200–280</text>
  <line x1="293" y1="157" x2="293" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── APPLICATION BLOCKS ── -->
  <rect x="0" y="180" width="680" height="14" fill="#0C0C14" opacity="0.92"/>
  <rect x="0" y="194" width="680" height="14" fill="#080810" opacity="0.92"/>
  <text x="3" y="191" font-size="5.5" fill="#475569" font-weight="bold">BAND</text>
  <text x="3" y="205" font-size="5.5" fill="#475569" font-weight="bold">USE</text>

  <!-- Sub-band name row -->
  <rect x="30"  y="180" width="136" height="13" fill="#3B1D8A" opacity="0.80"/>
  <text x="98"  y="189" font-size="5.5" fill="#C4B5FD" text-anchor="middle">UVA  315–400nm</text>
  <rect x="166" y="180" width="53"  height="13" fill="#4C1D96" opacity="0.80"/>
  <text x="192" y="189" font-size="5" fill="#DDD6FE" text-anchor="middle">UVB</text>
  <rect x="219" y="180" width="149" height="13" fill="#5B21B6" opacity="0.75"/>
  <text x="293" y="189" font-size="5.5" fill="#DDD6FE" text-anchor="middle">UVC  200–280nm</text>
  <rect x="368" y="180" width="159" height="13" fill="#6D28D9" opacity="0.70"/>
  <text x="447" y="189" font-size="5.5" fill="#EDE9FE" text-anchor="middle">VUV  100–200nm</text>
  <rect x="527" y="180" width="123" height="13" fill="#7C3AED" opacity="0.60"/>
  <text x="588" y="189" font-size="5.5" fill="#F5F3FF" text-anchor="middle">EUV  10–100nm</text>

  <!-- Application row -->
  <rect x="30"  y="194" width="136" height="13" fill="#1E1040" opacity="0.80"/>
  <text x="98"  y="203" font-size="4.5" fill="#A78BFA" text-anchor="middle">Black-light, UV MWS, plume detect</text>
  <rect x="166" y="194" width="53"  height="13" fill="#200E4A" opacity="0.80"/>
  <text x="192" y="203" font-size="4.5" fill="#C4B5FD" text-anchor="middle">Sunburn / bio</text>
  <rect x="219" y="194" width="149" height="13" fill="#280E5A" opacity="0.75"/>
  <text x="293" y="203" font-size="4.5" fill="#DDD6FE" text-anchor="middle">Solar-blind seeker; germicidal; bio-detect</text>
  <rect x="368" y="194" width="159" height="13" fill="#30106A" opacity="0.70"/>
  <text x="447" y="203" font-size="4.5" fill="#EDE9FE" text-anchor="middle">Absorbed by atmosphere — lab / space only</text>
  <rect x="527" y="194" width="123" height="13" fill="#3B127A" opacity="0.65"/>
  <text x="588" y="203" font-size="4.5" fill="#F5F3FF" text-anchor="middle">EUV lithography / space</text>

  <line x1="30" y1="194" x2="650" y2="194" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#A78BFA" font-weight="bold">UV</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">400 – 10nm</text>
  <text x="10" y="42" font-size="6" fill="#475569">Ultraviolet</text>
</svg>
