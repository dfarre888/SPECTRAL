<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!--
    DEW / Laser Band Overlay: 20μm → 350nm  LOG WAVELENGTH SCALE
    x = 30 + log10(20/λ_μm) / log10(20/0.35) * 620   [÷1.7570]

    Key positions:
    20μm → x=30   | 10.6μm → x=127  | 8μm → x=170
    5μm  → x=242  | 3μm    → x=321  | 1.55μm → x=422
    1.064μm → x=479 | 0.7μm → x=543  | 0.532μm → x=586
    0.44μm  → x=615 | 0.35μm → x=650
  -->

  <!-- Scale area background -->
  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Sub-band fills — DEW engagement zones -->
  <!-- LWIR CO2 zone 8–20μm: x=30→170 -->
  <rect x="30"  y="92" width="140" height="23" fill="#1E1B4B" opacity="0.22"/>
  <!-- MWIR DIRCM zone 3–8μm: x=170→321 -->
  <rect x="170" y="92" width="151" height="23" fill="#065F46" opacity="0.20"/>
  <!-- SWIR eye-safe 1.5–3μm: x=321→422 -->
  <rect x="321" y="92" width="101" height="23" fill="#581C87" opacity="0.18"/>
  <!-- NIR HEL 0.7–1.5μm: x=422→543 -->
  <rect x="422" y="92" width="121" height="23" fill="#7C3AED" opacity="0.28"/>
  <!-- VIS dazzler 0.35–0.7μm: x=543→650 -->
  <rect x="543" y="92" width="107" height="23" fill="#78350F" opacity="0.24"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- MIRACL / THEL CO2 10.6μm (legacy HEL) -->
  <rect x="30"  y="44" width="126" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="93"  y="55" font-size="7" fill="#93C5FD" text-anchor="middle">MIRACL / THEL  10.6 μm</text>
  <line x1="93" y1="61" x2="127" y2="82" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- DIRCM / CIRCM 3–5μm -->
  <rect x="168" y="44" width="128" height="17" rx="2" fill="#064E3B" opacity="0.88"/>
  <text x="232" y="55" font-size="7" fill="#6EE7B7" text-anchor="middle">DIRCM / CIRCM  3–5 μm</text>
  <line x1="232" y1="61" x2="270" y2="82" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- HELIOS · Iron Beam · DRAGONFIRE 1.07μm -->
  <rect x="376" y="35" width="174" height="17" rx="2" fill="#4C1D95" opacity="0.88"/>
  <text x="463" y="46" font-size="6.5" fill="#DDD6FE" text-anchor="middle">HELIOS · Iron Beam · DRAGONFIRE  1.07μm</text>
  <line x1="479" y1="52" x2="479" y2="82" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- GLARE dazzler 0.532μm -->
  <rect x="550" y="53" width="100" height="17" rx="2" fill="#78350F" opacity="0.88"/>
  <text x="600" y="64" font-size="7" fill="#FDE68A" text-anchor="middle">GLARE  0.532 μm</text>
  <line x1="586" y1="70" x2="586" y2="82" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30"  y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30"  y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Major ticks -->
  <line x1="127" y1="109" x2="127" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="242" y1="109" x2="242" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="479" y1="109" x2="479" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="586" y1="109" x2="586" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <!-- Zone boundary dashes -->
  <line x1="170" y1="110" x2="170" y2="120" stroke="#64748B" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="321" y1="110" x2="321" y2="120" stroke="#64748B" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="422" y1="110" x2="422" y2="120" stroke="#64748B" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="543" y1="110" x2="543" y2="120" stroke="#64748B" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- Wavelength labels -->
  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">20μm</text>
  <text x="127" y="140" font-size="7.5" fill="#93C5FD" text-anchor="middle">10.6μm</text>
  <text x="242" y="140" font-size="7.5" fill="#6EE7B7" text-anchor="middle">5μm</text>
  <text x="479" y="140" font-size="7.5" fill="#DDD6FE" text-anchor="middle">1.064μm</text>
  <text x="586" y="140" font-size="7.5" fill="#FDE68A" text-anchor="middle">0.532μm</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">350nm</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">wavelength (log) → frequency increases →</text>

  <!-- ── RED FORCE BADGE ── -->
  <!-- SA-24 Igla-S seeker 3–5μm (DIRCM threat) -->
  <rect x="160" y="157" width="148" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="234" y="168" font-size="7" fill="#FCA5A5" text-anchor="middle">SA-24 MANPADS seeker  3–5 μm</text>
  <line x1="270" y1="157" x2="270" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── APPLICATION BLOCKS ── -->
  <rect x="0" y="180" width="680" height="14" fill="#0C0C14" opacity="0.92"/>
  <rect x="0" y="194" width="680" height="14" fill="#080810" opacity="0.92"/>

  <!-- BAND row -->
  <text x="3" y="191" font-size="5.5" fill="#475569" font-weight="bold">BAND</text>
  <rect x="30"  y="180" width="140" height="13" fill="#1E1B4B" opacity="0.80"/>
  <text x="100" y="189" font-size="5.5" fill="#A5B4FC" text-anchor="middle">CO₂ LWIR  10.6μm</text>
  <rect x="170" y="180" width="151" height="13" fill="#064E3B" opacity="0.75"/>
  <text x="245" y="189" font-size="5.5" fill="#6EE7B7" text-anchor="middle">MWIR  3–8μm — DIRCM</text>
  <rect x="321" y="180" width="101" height="13" fill="#3B0764" opacity="0.80"/>
  <text x="371" y="189" font-size="5"   fill="#C4B5FD" text-anchor="middle">SWIR eye-safe</text>
  <rect x="422" y="180" width="121" height="13" fill="#4C1D95" opacity="0.80"/>
  <text x="482" y="189" font-size="5.5" fill="#DDD6FE" text-anchor="middle">NIR / 1μm HEL</text>
  <rect x="543" y="180" width="107" height="13" fill="#78350F" opacity="0.80"/>
  <text x="596" y="189" font-size="5"   fill="#FDE68A" text-anchor="middle">VIS dazzle</text>

  <!-- USE row -->
  <text x="3" y="205" font-size="5.5" fill="#475569" font-weight="bold">USE</text>
  <rect x="30"  y="194" width="140" height="13" fill="#0F0F1A" opacity="0.80"/>
  <text x="100" y="203" font-size="4.5" fill="#6B7280" text-anchor="middle">MIRACL / THEL (legacy)</text>
  <rect x="170" y="194" width="151" height="13" fill="#022C22" opacity="0.75"/>
  <text x="245" y="203" font-size="4.5" fill="#34D399" text-anchor="middle">DIRCM / CIRCM MANPADS defeat</text>
  <rect x="321" y="194" width="101" height="13" fill="#1A0A30" opacity="0.80"/>
  <text x="371" y="203" font-size="4.5" fill="#C4B5FD" text-anchor="middle">Eye-safe LRF / comms</text>
  <rect x="422" y="194" width="121" height="13" fill="#2E1065" opacity="0.80"/>
  <text x="482" y="203" font-size="4.5" fill="#DDD6FE" text-anchor="middle">HELIOS · Iron Beam · SHiELD</text>
  <rect x="543" y="194" width="107" height="13" fill="#451A03" opacity="0.80"/>
  <text x="596" y="203" font-size="4.5" fill="#FDE68A" text-anchor="middle">GLARE dazzler</text>

  <line x1="30" y1="194" x2="650" y2="194" stroke="#1E293B" stroke-width="0.5"/>

  <!-- Title -->
  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">Laser / DEW</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">20μm – 350nm</text>
  <text x="10" y="42" font-size="6"   fill="#475569">Directed energy weapons (log wavelength)</text>
</svg>
