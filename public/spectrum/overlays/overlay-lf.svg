<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- LF Band Overlay: 30–300 kHz  |  x = 30 + (f_kHz - 30) / 270 * 620 -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- LORAN-C fill 90–110 kHz (Blue Force span) → x=168 to x=214 -->
  <rect x="168" y="92" width="46"  height="23" fill="#1E3A8A" opacity="0.35"/>
  <!-- DGPS beacons 283.5–325 kHz (above our range, show at x=612+) -->
  <rect x="612" y="92" width="38"  height="23" fill="#064E3B" opacity="0.35"/>

  <!-- Russian LF submarine comms 30–150 kHz (Red Force) -->
  <rect x="30"  y="115" width="276" height="23" fill="#7F1D1D" opacity="0.25"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- LORAN-C 100 kHz navigation -->
  <rect x="155" y="44" width="100" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="205" y="55" font-size="7.5" fill="#BFDBFE" text-anchor="middle">LORAN-C  100 kHz</text>
  <line x1="191" y1="61" x2="191" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- DGPS Marine Beacons 283.5–325 kHz -->
  <rect x="572" y="56" width="70" height="17" rx="2" fill="#064E3B" opacity="0.88"/>
  <text x="607" y="67" font-size="7" fill="#A7F3D0" text-anchor="middle">DGPS  283–325</text>
  <line x1="612" y1="73" x2="612" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks: 60, 100, 150, 200, 250 kHz -->
  <line x1="99"  y1="109" x2="99"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="306" y1="109" x2="306" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="99"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">60</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">100</text>
  <text x="306" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">150</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">200</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">250</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">300</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">kHz</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- Russian submarine comms 30–150 kHz -->
  <rect x="40"  y="157" width="140" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="110" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">RU Sub-Comms  30–150</text>
  <line x1="110" y1="157" x2="110" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA -->
  <!-- MIL 30–80 kHz -->
  <rect x="30"  y="183" width="138" height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="99"  y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <!-- RNS 90–110 kHz (LORAN-C) -->
  <rect x="168" y="183" width="46"  height="11" fill="#4B1D96" opacity="0.88"/>
  <text x="191" y="192" font-size="5.5" fill="#DDD6FE" text-anchor="middle">RNS</text>
  <!-- FS 110–283 kHz -->
  <rect x="214" y="183" width="398" height="11" fill="#1C1917" opacity="0.88"/>
  <text x="413" y="192" font-size="5.5" fill="#A8A29E" text-anchor="middle">FS / FIXED</text>
  <!-- RNS 283.5–325 kHz (DGPS) -->
  <rect x="612" y="183" width="38"  height="11" fill="#4B1D96" opacity="0.88"/>
  <text x="631" y="192" font-size="5" fill="#DDD6FE" text-anchor="middle">RNS</text>

  <!-- NTIA -->
  <!-- GOV 30–300 kHz (military, government navigation) -->
  <rect x="30"  y="195" width="620" height="11" fill="#92400E" opacity="0.75"/>
  <text x="340" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV — Military / Government Navigation (LORAN-C, DGPS)</text>

  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">LF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">30 – 300 kHz</text>
</svg>
