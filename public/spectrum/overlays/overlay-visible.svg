<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!--
    Visible Light Overlay: 380–780nm  LINEAR wavelength scale
    x = 30 + (λ_nm - 380) / 400 * 620

    380nm → x=30   |  430nm → x=108   |  495nm → x=225
    570nm → x=408  |  625nm → x=496   |  700nm → x=651 ~ 650
    780nm → x=650 (end)
  -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Spectral colour gradient on scale area (decorative) -->
  <defs>
    <linearGradient id="visSpectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"    stop-color="#6600AA" stop-opacity="0.35"/>
      <stop offset="13%"   stop-color="#2200FF" stop-opacity="0.35"/>
      <stop offset="30%"   stop-color="#0033FF" stop-opacity="0.30"/>
      <stop offset="45%"   stop-color="#00AAFF" stop-opacity="0.25"/>
      <stop offset="55%"   stop-color="#00FF44" stop-opacity="0.25"/>
      <stop offset="67%"   stop-color="#FFEE00" stop-opacity="0.30"/>
      <stop offset="80%"   stop-color="#FF4400" stop-opacity="0.35"/>
      <stop offset="100%"  stop-color="#AA0000" stop-opacity="0.30"/>
    </linearGradient>
  </defs>
  <rect x="30" y="92" width="620" height="23" fill="url(#visSpectrum)"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- MQ-9 MTS-B EO/IR camera 450–900nm (extends NIR) -->
  <rect x="90"  y="35" width="130" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="155" y="46" font-size="7.5" fill="#BFDBFE" text-anchor="middle">MQ-9 MTS-B  450–900nm</text>
  <!-- 450nm → x=30+(450-380)/400*620=30+109=139; 700nm→x=651(clipped to 650) -->
  <line x1="139" y1="52" x2="139" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- TB-2 WESCAM MX-15D 420–700nm -->
  <rect x="50"  y="56" width="118" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="109" y="67" font-size="7.5" fill="#A7F3D0" text-anchor="middle">TB-2 MX-15D  420–700</text>
  <!-- 420nm → x=30+(420-380)/400*620=30+62=92; 700nm→x=30+(700-380)/400*620=30+496=526 -->
  <line x1="92" y1="73" x2="92" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#D4D4D8" stroke-width="6" opacity="0.10"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#E2E8F0" stroke-width="1.5"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#94A3B8" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Ticks every 80nm: 380, 460, 540, 620, 700, 780 -->
  <!-- 380 → x=30   |  460 → x=154  |  540 → x=278  |  620 → x=403  |  700 → x=527  |  780 → x=650 -->
  <line x1="154" y1="109" x2="154" y2="121" stroke="#94A3B8" stroke-width="1"/>
  <line x1="278" y1="109" x2="278" y2="121" stroke="#94A3B8" stroke-width="1"/>
  <line x1="403" y1="109" x2="403" y2="121" stroke="#94A3B8" stroke-width="1"/>
  <line x1="527" y1="109" x2="527" y2="121" stroke="#94A3B8" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">380</text>
  <text x="154" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">460</text>
  <text x="278" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">540</text>
  <text x="403" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">620</text>
  <text x="527" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">700</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">780</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">nm</text>

  <!-- Colour band labels on scale -->
  <text x="65"  y="110" font-size="5.5" fill="#9B59B6" text-anchor="middle">VIOLET</text>
  <text x="154" y="110" font-size="5.5" fill="#3B82F6" text-anchor="middle">BLUE</text>
  <text x="243" y="110" font-size="5.5" fill="#06B6D4" text-anchor="middle">CYAN</text>
  <text x="310" y="110" font-size="5.5" fill="#22C55E" text-anchor="middle">GREEN</text>
  <text x="390" y="110" font-size="5.5" fill="#EAB308" text-anchor="middle">YELLOW</text>
  <text x="466" y="110" font-size="5.5" fill="#F97316" text-anchor="middle">ORANGE</text>
  <text x="575" y="110" font-size="5.5" fill="#EF4444" text-anchor="middle">RED</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- FPV HD camera 380–700nm (full visible) -->
  <rect x="28"  y="157" width="110" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="83"  y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">FPV HD cam  380–700</text>
  <line x1="83" y1="157" x2="83" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Shahed-136 optical guidance — human eye range 380–780nm -->
  <rect x="155" y="157" width="130" height="17" rx="2" fill="#7F1D1D" opacity="0.75"/>
  <text x="220" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Shahed-136  380–780nm</text>
  <line x1="340" y1="157" x2="340" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── CAMERA COVERAGE BLOCKS ── -->
  <rect x="0" y="180" width="680" height="12" fill="#0C0C14" opacity="0.92"/>
  <rect x="0" y="192" width="680" height="12" fill="#080810" opacity="0.92"/>
  <text x="3" y="189" font-size="5.5" fill="#475569" font-weight="bold">BF CAM</text>
  <text x="3" y="201" font-size="5.5" fill="#475569" font-weight="bold">RF CAM</text>

  <!-- Blue Force camera coverage -->
  <!-- MQ-9 MTS-B 450–900nm → x=139 to x=650+ -->
  <rect x="139" y="180" width="511" height="11" fill="#1E3A8A" opacity="0.75"/>
  <text x="394" y="189" font-size="5" fill="#BFDBFE" text-anchor="middle">MQ-9 MTS-B  450–900nm  (EO+NIR)</text>
  <!-- TB-2 MX-15D 420–700nm → x=92 to x=527 -->
  <rect x="92"  y="180" width="435" height="11" fill="#065F46" opacity="0.50"/>
  <text x="186" y="189" font-size="5" fill="#6EE7B7" text-anchor="middle">TB-2 MX-15D 420–700</text>

  <!-- Red Force camera coverage -->
  <!-- FPV 380–700nm → x=30 to x=527 -->
  <rect x="30"  y="192" width="497" height="11" fill="#7F1D1D" opacity="0.70"/>
  <text x="200" y="201" font-size="5" fill="#FCA5A5" text-anchor="middle">FPV  380–700nm</text>
  <!-- Shahed 380–780nm → x=30 to x=650 -->
  <rect x="30"  y="192" width="620" height="11" fill="#7F1D1D" opacity="0.30"/>
  <text x="480" y="201" font-size="5" fill="#FCA5A5" text-anchor="middle">Shahed-136  380–780nm (human eye)</text>

  <line x1="30" y1="192" x2="650" y2="192" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#E2E8F0" font-weight="bold">VIS</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">380 – 780nm</text>
  <text x="10" y="42" font-size="6" fill="#475569">Visible spectrum</text>
</svg>
