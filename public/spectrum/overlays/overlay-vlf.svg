<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- VLF Band Overlay: 3–30 kHz  |  x = 30 + (f_kHz - 3) / 27 * 620 -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- NWC Harold Holt 22.3 kHz (Blue Force fill) → x=473 -->
  <rect x="460" y="92" width="26"  height="23" fill="#065F46" opacity="0.50"/>
  <!-- Jim Creek / NAA 24.8 kHz (Blue Force fill) → x=530 -->
  <rect x="519" y="92" width="26"  height="23" fill="#064E3B" opacity="0.50"/>

  <!-- RU Alpha VLF 11.9–14.9 kHz (Red Force fill) → x=233 to x=303 -->
  <rect x="233" y="115" width="70"  height="23" fill="#7F1D1D" opacity="0.28"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- NWC Harold Holt 22.3 kHz submarine VLF (AUS/NATO) -->
  <rect x="420" y="44" width="120" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="480" y="55" font-size="7.5" fill="#A7F3D0" text-anchor="middle">Harold Holt  22.3 kHz</text>
  <line x1="473" y1="61" x2="473" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Jim Creek / TACAMO 24.8 kHz US Navy -->
  <rect x="492" y="58" width="104" height="17" rx="2" fill="#064E3B" opacity="0.88"/>
  <text x="544" y="69" font-size="7.5" fill="#A7F3D0" text-anchor="middle">Jim Creek  24.8 kHz</text>
  <line x1="530" y1="75" x2="530" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks: 5, 10, 15, 20, 25 kHz -->
  <!-- 5  → x=30+(5-3)/27*620=30+46=76   -->
  <!-- 10 → x=30+(10-3)/27*620=30+161=191 -->
  <!-- 15 → x=30+(15-3)/27*620=30+276=306 -->
  <!-- 20 → x=30+(20-3)/27*620=30+390=420 -->
  <!-- 25 → x=30+(25-3)/27*620=30+505=535 -->
  <line x1="76"  y1="109" x2="76"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="306" y1="109" x2="306" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">3</text>
  <text x="76"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">5</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">10</text>
  <text x="306" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">15</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">20</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">25</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">kHz</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- RU Alpha RSDN-20 VLF navigation / submarine comms 11.9–14.9 kHz -->
  <rect x="196" y="157" width="130" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="261" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">RU Alpha 11.9–14.9 kHz</text>
  <line x1="268" y1="157" x2="268" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA: MIL across full VLF band -->
  <rect x="30"  y="183" width="620" height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="340" y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL — Military  /  RNS Navigation (VLF submarine comms)</text>

  <!-- NTIA: GOV across full VLF band -->
  <rect x="30"  y="195" width="620" height="11" fill="#92400E" opacity="0.75"/>
  <text x="340" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV — Strategic submarine communication (TACAMO, Harold Holt)</text>

  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">VLF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">3 – 30 kHz</text>
</svg>
