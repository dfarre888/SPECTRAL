<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- EHF Band Overlay: 30–300 GHz  |  x = 30 + (f_GHz - 30) / 270 * 620 -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Blue Force spans: EHF AEHF SATCOM 44 GHz uplink / 20 GHz downlink is in SHF; EHF: 43–45 GHz uplink -->
  <!-- 44 GHz → x = 30 + 14/270*620 = 62 (uplink) -->
  <rect x="53"  y="92" width="18"  height="23" fill="#4C1D95" opacity="0.60"/>
  <!-- W-band sensing 75–110 GHz: x=113 to x=183 -->
  <rect x="113" y="92" width="70"  height="23" fill="#065F46" opacity="0.22"/>
  <!-- Milliwave 5G 60 GHz: x=91 to x=99 -->
  <rect x="88"  y="92" width="14"  height="23" fill="#0E4F64" opacity="0.45"/>

  <!-- Red Force: broad EHF jamming potential / AEHF threat rx band -->
  <rect x="30"  y="115" width="115" height="23" fill="#7F1D1D" opacity="0.18"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- AEHF SATCOM uplink 43.5–45.5 GHz -->
  <rect x="28"  y="44" width="120" height="17" rx="2" fill="#4C1D95" opacity="0.88"/>
  <text x="88"  y="55" font-size="7.5" fill="#DDD6FE" text-anchor="middle">AEHF SATCOM 44 GHz</text>
  <line x1="62" y1="61" x2="62" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- W-band mmWave radar (APS, vehicle protection) 76–81 GHz -->
  <rect x="110" y="56" width="110" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="165" y="67" font-size="7.5" fill="#A7F3D0" text-anchor="middle">W-band Radar  76–81</text>
  <line x1="150" y1="73" x2="150" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks: 60, 100, 150, 200, 250 GHz -->
  <!-- 60  → x = 30 + 30/270*620  = 99  -->
  <!-- 100 → x = 30 + 70/270*620  = 191 -->
  <!-- 150 → x = 30 + 120/270*620 = 305 -->
  <!-- 200 → x = 30 + 170/270*620 = 420 -->
  <!-- 250 → x = 30 + 220/270*620 = 535 -->
  <line x1="99"  y1="109" x2="99"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="305" y1="109" x2="305" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="99"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">60</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">100</text>
  <text x="305" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">150</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">200</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">250</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">300</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">GHz</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- Krasukha-4 EW / AEHF jamming 30–60 GHz -->
  <rect x="25"  y="157" width="138" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="94"  y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Krasukha-4 EW  30–60</text>
  <line x1="64" y1="157" x2="64" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA -->
  <!-- MIL 30–52 GHz (AEHF, V-band mil) -->
  <rect x="30"  y="183" width="69"  height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="64"  y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <!-- ISM 60 GHz (V-band 57–66 GHz unlicensed) -->
  <rect x="90"  y="183" width="18"  height="11" fill="#374151" opacity="0.88"/>
  <text x="99"  y="192" font-size="5" fill="#9CA3AF" text-anchor="middle">ISM</text>
  <!-- SAT 65–90 GHz (W-band sat) -->
  <rect x="108" y="183" width="77"  height="11" fill="#1E1B4B" opacity="0.88"/>
  <text x="146" y="192" font-size="5.5" fill="#C7D2FE" text-anchor="middle">SAT</text>
  <!-- FS/MIL 90–300 GHz -->
  <rect x="185" y="183" width="465" height="11" fill="#1C1917" opacity="0.80"/>
  <text x="417" y="192" font-size="5.5" fill="#A8A29E" text-anchor="middle">FS / Research</text>

  <!-- NTIA -->
  <!-- GOV 30–52 GHz (AEHF mil SATCOM) -->
  <rect x="30"  y="195" width="69"  height="11" fill="#92400E" opacity="0.80"/>
  <text x="64"  y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV</text>
  <!-- SHR/NGV 57–66 GHz (60 GHz unlicensed mmWave) -->
  <rect x="90"  y="195" width="27"  height="11" fill="#1E3A5F" opacity="0.80"/>
  <text x="103" y="204" font-size="5" fill="#BFDBFE" text-anchor="middle">SHR</text>
  <!-- GOV 76–100 GHz (W-band radar) -->
  <rect x="113" y="195" width="69"  height="11" fill="#92400E" opacity="0.75"/>
  <text x="147" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV</text>
  <!-- SHR 100–300 GHz (future research, shared) -->
  <rect x="182" y="195" width="468" height="11" fill="#1A3A2A" opacity="0.70"/>
  <text x="416" y="204" font-size="5.5" fill="#A7F3D0" text-anchor="middle">SHN — Emerging / Research</text>

  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">EHF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">30 – 300 GHz</text>
</svg>
