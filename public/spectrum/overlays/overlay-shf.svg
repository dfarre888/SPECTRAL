<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- SHF Band Overlay: 3–30 GHz  |  x = 30 + (f_GHz - 3) / 27 * 620 -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- Blue Force span: Ku/Ka SAR/comms 12–18 GHz → x=208 to x=344 -->
  <rect x="208" y="92" width="136" height="23" fill="#065F46" opacity="0.25"/>
  <!-- X-band SAR/radar 8–12 GHz → x=116 to x=208 -->
  <rect x="116" y="92" width="92"  height="23" fill="#1E3A8A" opacity="0.22"/>
  <!-- MilSat uplink 14–14.5 GHz → x=253 to x=264 -->
  <rect x="253" y="92" width="11"  height="23" fill="#4C1D95" opacity="0.55"/>

  <!-- Red Force spans: Kolchuga L/S/X 1.5–18 GHz (below scale) -->
  <rect x="30"  y="115" width="344" height="23" fill="#7F1D1D" opacity="0.20"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- X-band SAR / targeting radar (Lynx, SeaVue) 8–12 GHz -->
  <rect x="90"  y="35" width="130" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="155" y="46" font-size="7.5" fill="#BFDBFE" text-anchor="middle">X-SAR / Radar  8–12 GHz</text>
  <line x1="162" y1="52" x2="162" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Ku-band SATCOM MQ-9/GCS uplink 14–14.5 GHz -->
  <rect x="220" y="56" width="130" height="17" rx="2" fill="#4C1D95" opacity="0.88"/>
  <text x="285" y="67" font-size="7.5" fill="#DDD6FE" text-anchor="middle">Ku SATCOM 14–14.5 GHz</text>
  <line x1="258" y1="73" x2="258" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Ka-band SATCOM wideband 26–30 GHz -->
  <rect x="520" y="35" width="120" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="580" y="46" font-size="7.5" fill="#A7F3D0" text-anchor="middle">Ka SATCOM  26–30 GHz</text>
  <line x1="580" y1="52" x2="580" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks: 5, 10, 15, 20, 25 GHz  -->
  <!-- 5  → x = 30 + 2/27*620  = 76  -->
  <!-- 10 → x = 30 + 7/27*620  = 191 -->
  <!-- 15 → x = 30 + 12/27*620 = 305 -->
  <!-- 20 → x = 30 + 17/27*620 = 420 -->
  <!-- 25 → x = 30 + 22/27*620 = 535 -->
  <line x1="76"  y1="109" x2="76"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="305" y1="109" x2="305" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">3</text>
  <text x="76"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">5</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">10</text>
  <text x="305" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">15</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">20</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">25</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">GHz</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- Kolchuga passive ELINT 0.1–18 GHz -->
  <rect x="30"  y="157" width="148" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="104" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Kolchuga ELINT  0.1–18</text>
  <line x1="104" y1="157" x2="104" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Nebo-M VHF/UHF/L/S radar (cross-band) -->
  <rect x="200" y="157" width="130" height="17" rx="2" fill="#7F1D1D" opacity="0.75"/>
  <text x="265" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Nebo-M  L/S  1.3–4 GHz</text>
  <line x1="265" y1="157" x2="265" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA  -->
  <!-- MIL 3–5 GHz (S/C-band military radar) -->
  <rect x="30"  y="183" width="46"  height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="53"  y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <!-- SAT 5–8 GHz (C-band SATCOM) -->
  <rect x="76"  y="183" width="70"  height="11" fill="#1E1B4B" opacity="0.88"/>
  <text x="111" y="192" font-size="5.5" fill="#C7D2FE" text-anchor="middle">SAT</text>
  <!-- MIL 8–12 GHz (X-band) -->
  <rect x="146" y="183" width="92"  height="11" fill="#5B3A29" opacity="0.88"/>
  <text x="192" y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <!-- SAT 12–18 GHz (Ku) -->
  <rect x="238" y="183" width="138" height="11" fill="#1E1B4B" opacity="0.88"/>
  <text x="307" y="192" font-size="5.5" fill="#C7D2FE" text-anchor="middle">SAT / Ku</text>
  <!-- ISM 24–24.25 GHz -->
  <rect x="489" y="183" width="13"  height="11" fill="#374151" opacity="0.88"/>
  <!-- SAT 26–30 GHz (Ka) -->
  <rect x="536" y="183" width="114" height="11" fill="#1E1B4B" opacity="0.88"/>
  <text x="593" y="192" font-size="5.5" fill="#C7D2FE" text-anchor="middle">SAT / Ka</text>

  <!-- NTIA -->
  <!-- GOV 3–17 GHz (military radar/SATCOM) -->
  <rect x="30"  y="195" width="345" height="11" fill="#92400E" opacity="0.75"/>
  <text x="202" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV — Military Radar / SATCOM</text>
  <!-- SHR 17–24 GHz -->
  <rect x="375" y="195" width="127" height="11" fill="#1E3A5F" opacity="0.80"/>
  <text x="438" y="204" font-size="5.5" fill="#BFDBFE" text-anchor="middle">SHR</text>
  <!-- GOV 24–30 GHz (Ka-band gov SATCOM) -->
  <rect x="502" y="195" width="148" height="11" fill="#92400E" opacity="0.75"/>
  <text x="576" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV / Ka SATCOM</text>

  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">SHF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">3 – 30 GHz</text>
</svg>
