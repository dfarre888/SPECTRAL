<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 230" font-family="'JetBrains Mono', 'Courier New', monospace">
  <!-- HF Band Overlay: 3–30 MHz  |  x = 30 + (f_MHz - 3) / 27 * 620 -->

  <rect x="0" y="82" width="680" height="66" fill="#0A0A0F" opacity="0.72"/>

  <!-- OTH-B radar sweep fill (5–28 MHz) — Blue Force span -->
  <rect x="76"  y="92" width="544" height="23" fill="#1E3A8A" opacity="0.18"/>
  <!-- HFGCS comms cluster 8–22 MHz -->
  <rect x="145" y="92" width="298" height="23" fill="#065F46" opacity="0.22"/>

  <!-- Red Force spans below scale -->
  <!-- Duga-3 OTH radar 7.3–17.1 MHz -->
  <rect x="128" y="115" width="226" height="23" fill="#7F1D1D" opacity="0.28"/>

  <!-- ── BLUE FORCE BADGES ── -->
  <!-- OTH-B Over-the-Horizon radar 5–28 MHz -->
  <rect x="235" y="35" width="124" height="17" rx="2" fill="#1E3A8A" opacity="0.88"/>
  <text x="297" y="46" font-size="7.5" fill="#BFDBFE" text-anchor="middle">OTH-B Radar  5–28 MHz</text>
  <line x1="297" y1="52" x2="297" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- HFGCS US Air Force (4 channels: 8.175 / 11.175 / 15.016 / 20.999 MHz) -->
  <!-- 8.175 MHz → x=145 -->
  <rect x="130" y="56" width="84" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="172" y="67" font-size="7.5" fill="#A7F3D0" text-anchor="middle">HFGCS 8.175</text>
  <line x1="145" y1="73" x2="145" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- 15.016 MHz → x=306 -->
  <rect x="272" y="56" width="90" height="17" rx="2" fill="#065F46" opacity="0.88"/>
  <text x="317" y="67" font-size="7.5" fill="#A7F3D0" text-anchor="middle">HFGCS 15.016</text>
  <line x1="306" y1="73" x2="306" y2="92" stroke="#06B6D4" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── SCALE BAR ── -->
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="6" opacity="0.12"/>
  <line x1="30" y1="115" x2="650" y2="115" stroke="#06B6D4" stroke-width="2"/>
  <line x1="30"  y1="108" x2="30"  y2="122" stroke="#06B6D4" stroke-width="1.5"/>
  <line x1="650" y1="108" x2="650" y2="122" stroke="#06B6D4" stroke-width="1.5"/>

  <!-- Ticks: 5, 10, 15, 20, 25 MHz -->
  <line x1="76"  y1="109" x2="76"  y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="191" y1="109" x2="191" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="306" y1="109" x2="306" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="420" y1="109" x2="420" y2="121" stroke="#06B6D4" stroke-width="1"/>
  <line x1="535" y1="109" x2="535" y2="121" stroke="#06B6D4" stroke-width="1"/>

  <text x="30"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">3</text>
  <text x="76"  y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">5</text>
  <text x="191" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">10</text>
  <text x="306" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">15</text>
  <text x="420" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">20</text>
  <text x="535" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">25</text>
  <text x="650" y="140" font-size="7.5" fill="#94A3B8" text-anchor="middle">30</text>
  <text x="340" y="150" font-size="6.5" fill="#475569" text-anchor="middle">MHz</text>

  <!-- ── RED FORCE BADGES ── -->
  <!-- Duga-3 OTH radar 7.3–17.1 MHz -->
  <rect x="110" y="157" width="124" height="17" rx="2" fill="#7F1D1D" opacity="0.88"/>
  <text x="172" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Duga-3 OTH  7.3–17 MHz</text>
  <line x1="172" y1="157" x2="172" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Kontainer OTH radar (3–30 MHz full sweep) -->
  <rect x="380" y="157" width="130" height="17" rx="2" fill="#7F1D1D" opacity="0.75"/>
  <text x="445" y="168" font-size="7.5" fill="#FCA5A5" text-anchor="middle">Kontainer OTH  3–30</text>
  <line x1="445" y1="157" x2="445" y2="138" stroke="#F97316" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- ── ALLOCATION BARS ── -->
  <rect x="0" y="183" width="680" height="12" fill="#0C0C14" opacity="0.90"/>
  <rect x="0" y="195" width="680" height="12" fill="#0A0A10" opacity="0.90"/>
  <text x="3" y="192" font-size="6" fill="#475569" font-weight="bold">ACMA</text>
  <text x="3" y="204" font-size="6" fill="#475569" font-weight="bold">NTIA</text>

  <!-- ACMA: mostly FS (fixed service) with MIL and BCST overlay -->
  <rect x="30"  y="183" width="620" height="11" fill="#1C1917" opacity="0.88"/>
  <text x="100" y="192" font-size="5.5" fill="#A8A29E" text-anchor="middle">FS / FIXED</text>
  <!-- MIL overlay 3–30 MHz -->
  <rect x="30"  y="183" width="46"  height="11" fill="#5B3A29" opacity="0.75"/>
  <text x="53"  y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL</text>
  <rect x="145" y="183" width="505" height="11" fill="#5B3A29" opacity="0.55"/>
  <text x="400" y="192" font-size="5.5" fill="#D4B896" text-anchor="middle">MIL / FS</text>
  <!-- ARN: aeronautical HF 3–30 MHz (shared) -->
  <rect x="76"  y="183" width="69"  height="11" fill="#7D1128" opacity="0.60"/>
  <text x="110" y="192" font-size="5.5" fill="#FCA5A5" text-anchor="middle">ARN</text>

  <!-- NTIA: mostly GOV (military HF) -->
  <rect x="30"  y="195" width="620" height="11" fill="#92400E" opacity="0.75"/>
  <text x="340" y="204" font-size="5.5" fill="#FDE68A" text-anchor="middle">GOV — Military HF Comms / HFGCS</text>
  <!-- NGV overlay: international broadcast bands -->
  <rect x="145" y="195" width="23"  height="11" fill="#14532D" opacity="0.80"/>
  <rect x="214" y="195" width="23"  height="11" fill="#14532D" opacity="0.80"/>
  <rect x="306" y="195" width="38"  height="11" fill="#14532D" opacity="0.80"/>
  <text x="325" y="204" font-size="5" fill="#A7F3D0" text-anchor="middle">NGV</text>
  <!-- SHR: amateur bands -->
  <rect x="76"  y="195" width="69"  height="11" fill="#1E3A5F" opacity="0.70"/>
  <text x="110" y="204" font-size="5.5" fill="#BFDBFE" text-anchor="middle">SHR</text>

  <line x1="30" y1="195" x2="650" y2="195" stroke="#1E293B" stroke-width="0.5"/>

  <text x="10" y="17" font-size="12" fill="#06B6D4" font-weight="bold">HF</text>
  <text x="10" y="30" font-size="8.5" fill="#94A3B8">3 – 30 MHz</text>
</svg>
